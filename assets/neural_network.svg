<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 165" width="900" height="165">
<defs>
  <linearGradient id="bg-g" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0a0e17"/>
    <stop offset="100%" stop-color="#111827"/>
  </linearGradient>
  <linearGradient id="txt-g" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00d9ff"/>
    <stop offset="100%" stop-color="#9b4fff"/>
  </linearGradient>
  <filter id="gl">
    <feGaussianBlur stdDeviation="3.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gl-sm">
    <feGaussianBlur stdDeviation="1.8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    .br{fill:none;stroke:#1e3a60;stroke-width:1;animation:bp 4s ease-in-out infinite}
    @keyframes bp{0%,100%{opacity:.2}50%{opacity:.65}}

    .c{fill:none;stroke-width:.7;stroke-dasharray:5 9}
    .cb{stroke:#1e4a8a;animation:fd 3s linear infinite}
    .cp{stroke:#3d1a8a;animation:fd 2.5s linear infinite}
    @keyframes fd{to{stroke-dashoffset:-42}}
    .d1{animation-delay:.5s}.d2{animation-delay:1s}.d3{animation-delay:1.5s}.d4{animation-delay:2s}.d5{animation-delay:2.5s}
    .s2{animation-duration:2s!important}.s4{animation-duration:4s!important}

    .ni{fill:#00d9ff;filter:url(#gl-sm);animation:np 2.5s ease-in-out infinite}
    .nh{fill:#9b4fff;filter:url(#gl);animation:np 2.5s ease-in-out infinite}
    .no{fill:#00ff88;filter:url(#gl-sm);animation:np 2.5s ease-in-out infinite}
    @keyframes np{0%,100%{opacity:.45}50%{opacity:1}}
    .nd1{animation-delay:.25s}.nd2{animation-delay:.55s}.nd3{animation-delay:.9s}.nd4{animation-delay:1.25s}.nd5{animation-delay:1.6s}

    .div{stroke:#1e3a60;stroke-width:.7;opacity:.55}
    .t1{font:bold 23px 'Courier New',monospace;fill:url(#txt-g);filter:url(#gl-sm);letter-spacing:3px}
    .t2{font:10px 'Courier New',monospace;fill:#4a90d9;letter-spacing:5px}
    .t3{font:8px 'Courier New',monospace;fill:#2a4a70;letter-spacing:1px}
    .t4{font:9px 'Courier New',monospace;fill:#3a6080;letter-spacing:3px;animation:tb 2.5s ease-in-out infinite}
    @keyframes tb{0%,100%{opacity:.4}50%{opacity:.9}}
    .cur{fill:#00d9ff;animation:bk 1s step-end infinite}
    @keyframes bk{0%,100%{opacity:1}50%{opacity:0}}
    .lbl{font:7px 'Courier New',monospace;fill:#1e3050;letter-spacing:1px}
  </style>
</defs>

<rect width="900" height="165" fill="url(#bg-g)" rx="10"/>
<rect class="br" x="1" y="1" width="898" height="163" rx="10"/>

<!-- L1(x=85,y=32,82,132) → L2(x=300,y=18,50,82,114,146) -->
<line class="c cb"    x1="85" y1="32"  x2="300" y2="18"/>
<line class="c cb d1 s2" x1="85" y1="32"  x2="300" y2="50"/>
<line class="c cb d2" x1="85" y1="32"  x2="300" y2="82"/>
<line class="c cb d3 s4" x1="85" y1="32"  x2="300" y2="114"/>
<line class="c cb d4" x1="85" y1="32"  x2="300" y2="146"/>
<line class="c cb d2 s2" x1="85" y1="82"  x2="300" y2="18"/>
<line class="c cb d1" x1="85" y1="82"  x2="300" y2="50"/>
<line class="c cb d5" x1="85" y1="82"  x2="300" y2="82"/>
<line class="c cb d3" x1="85" y1="82"  x2="300" y2="114"/>
<line class="c cb d2 s4" x1="85" y1="82"  x2="300" y2="146"/>
<line class="c cb d4 s2" x1="85" y1="132" x2="300" y2="18"/>
<line class="c cb d3" x1="85" y1="132" x2="300" y2="50"/>
<line class="c cb d1 s4" x1="85" y1="132" x2="300" y2="82"/>
<line class="c cb d5" x1="85" y1="132" x2="300" y2="114"/>
<line class="c cb"    x1="85" y1="132" x2="300" y2="146"/>

<!-- L2(x=300) → L3(x=515,y=32,82,132) -->
<line class="c cp d1"    x1="300" y1="18"  x2="515" y2="32"/>
<line class="c cp d3 s2" x1="300" y1="18"  x2="515" y2="82"/>
<line class="c cp d5"    x1="300" y1="18"  x2="515" y2="132"/>
<line class="c cp d2"    x1="300" y1="50"  x2="515" y2="32"/>
<line class="c cp d1 s4" x1="300" y1="50"  x2="515" y2="82"/>
<line class="c cp d4"    x1="300" y1="50"  x2="515" y2="132"/>
<line class="c cp d3 s2" x1="300" y1="82"  x2="515" y2="32"/>
<line class="c cp d5"    x1="300" y1="82"  x2="515" y2="82"/>
<line class="c cp d2"    x1="300" y1="82"  x2="515" y2="132"/>
<line class="c cp d4"    x1="300" y1="114" x2="515" y2="32"/>
<line class="c cp d2 s4" x1="300" y1="114" x2="515" y2="82"/>
<line class="c cp d1"    x1="300" y1="114" x2="515" y2="132"/>
<line class="c cp d5 s2" x1="300" y1="146" x2="515" y2="32"/>
<line class="c cp d4"    x1="300" y1="146" x2="515" y2="82"/>
<line class="c cp d3"    x1="300" y1="146" x2="515" y2="132"/>

<!-- Nodes L1 (input, cyan) -->
<circle class="ni"    cx="85" cy="32"  r="7"/>
<circle class="ni nd3" cx="85" cy="82"  r="7"/>
<circle class="ni nd5" cx="85" cy="132" r="7"/>

<!-- Nodes L2 (hidden, purple) -->
<circle class="nh"    cx="300" cy="18"  r="6"/>
<circle class="nh nd2" cx="300" cy="50"  r="6"/>
<circle class="nh nd4" cx="300" cy="82"  r="8"/>
<circle class="nh nd1" cx="300" cy="114" r="6"/>
<circle class="nh nd3" cx="300" cy="146" r="6"/>

<!-- Nodes L3 (output, green) -->
<circle class="no nd2" cx="515" cy="32"  r="7"/>
<circle class="no nd4" cx="515" cy="82"  r="7"/>
<circle class="no nd1" cx="515" cy="132" r="7"/>

<!-- Layer labels -->
<text class="lbl" x="85"  y="157" text-anchor="middle">INPUT</text>
<text class="lbl" x="300" y="160" text-anchor="middle">HIDDEN</text>
<text class="lbl" x="515" y="157" text-anchor="middle">OUTPUT</text>

<!-- Divider -->
<line class="div" x1="570" y1="12" x2="570" y2="152"/>

<!-- Text: name -->
<text class="t1" x="735" y="52"  text-anchor="middle">GERARD</text>
<text class="t1" x="735" y="85"  text-anchor="middle">CARRÉ</text>

<!-- Separator line -->
<line x1="618" y1="96" x2="852" y2="96" stroke="#1e3a60" stroke-width=".5" opacity=".6"/>

<!-- Role -->
<text class="t2" x="735" y="113" text-anchor="middle">SYS · NET · AI</text>

<!-- Status -->
<text class="t4" x="700" y="133" text-anchor="middle">learning AI...</text>
<rect class="cur" x="768" y="121" width="7" height="11" rx="1"/>

<!-- Corner tags -->
<text class="t3" x="628" y="25">[ carre29 ]</text>
<text class="t3" x="628" y="152">[ v2.0 · 2025 ]</text>
</svg>
